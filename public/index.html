<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N+1 Problem Demo</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px; /* PC'de çok yayılmasın diye sınır */
        }

        h1 { font-size: 1.5rem; text-align: center; }

        /* BUTONLAR: Mobilde alt alta, PC'de yan yana */
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap; /* Mobilde sığmazsa aşağı kaydır */
        }

        button {
            flex: 1; /* Eşit genişlik */
            min-width: 160px; /* Mobilde çok küçülmesin */
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* ANA PANEL: Mobilde alt alta, PC'de yan yana (Grid) */
        .grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobilde tek sütun */
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1.5fr; /* PC'de iki sütun */
            }
            h1 { font-size: 2rem; }
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        #terminal {
            background: #0f172a;
            color: #38bdf8;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            min-height: 200px;
            max-height: 400px;
        }

        .yazar-box {
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 N+1 Performans Testi</h1>

    <div class="button-group">
        <button onclick="fetchData('/hatali')" style="background: #ef4444;">❌ Hatalı (N+1)</button>
        <button onclick="fetchData('/dogru')" style="background: #10b981;">✅ Doğru (Eager)</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📊 Veri Listesi</h3>
            <div id="result">Henüz veri çekilmedi.</div>
        </div>
        
        <div class="card" style="background: #0f172a;">
            <h3 style="color: white; margin-top: 0;">💻 SQL Terminal (Log)</h3>
            <div id="terminal">> Sorgu bekleniyor...</div>
        </div>
    </div>
</div>

<script>
    async function fetchData(url) {
        const resultDiv = document.getElementById('result');
        const terminalDiv = document.getElementById('terminal');
        
        resultDiv.innerHTML = "Yükleniyor...";
        terminalDiv.innerHTML = "> Sorgu gönderiliyor...";

        try {
            const response = await fetch(url);
            const data = await response.json();

            // Verileri Yazdır
            resultDiv.innerHTML = data.veri.map(yazar => `
                <div class="yazar-box">
                    <strong>👤 ${yazar.yazarAdi}</strong><br>
                    <small>📚 ${yazar.kitaplar.map(k => k.title).join(', ')}</small>
                </div>
            `).join('');

            // SQL Loglarını Yazdır
            terminalDiv.innerHTML = data.loglar.map(log => 
                `<span style="color: #94a3b8;">[SQL]</span> ${log}`
            ).join('<br><br>');

        } catch (err) {
            resultDiv.innerHTML = "Bir hata oluştu: " + err.message;
        }
    }
</script>

</body>
</html>
